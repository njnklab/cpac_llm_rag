pipeline_setup:
  pipeline_name: cpac-default-pipeline
  output_directory:
    path: /outputs/output
    source_outputs_dir: None
    pull_source_once: true
    write_func_outputs: false
    write_debugging_outputs: false
    output_tree: default
    quality_control:
      generate_quality_control_images: true
      generate_xcpqc_files: true
  working_directory:
    path: /outputs/working
    remove_working_dir: true
  log_directory:
    run_logging: true
    path: /outputs/logs
    graphviz:
      entire_workflow:
        generate: false
        graph2use: []
        format: []
        simple_form: true
  crash_log_directory:
    path: /outputs/crash
  system_config:
    fail_fast: false
    random_seed: null
    on_grid:
      run: false
      resource_manager: SGE
      SGE:
        parallel_environment: mpi_smp
        queue: all.q
    maximum_memory_per_participant: 50
    raise_insufficient: true
    observed_usage:
      callback_log: null
      buffer: 10
    max_cores_per_participant: 16
    num_ants_threads: 8
    num_OMP_threads: 1
    num_participants_at_once: 1
    FSLDIR: FSLDIR
  Amazon-AWS:
    aws_output_bucket_credentials: null
    s3_encryption: false
  Debugging:
    verbose: false
surface_analysis:
  abcd_prefreesurfer_prep:
    run: false
  freesurfer:
    run_reconall: false
    ingress_reconall: false
    reconall_args: null
  post_freesurfer:
    run: false
    subcortical_gray_labels: /opt/dcan-tools/pipeline/global/config/FreeSurferSubcorticalLabelTableLut.txt
    freesurfer_labels: /opt/dcan-tools/pipeline/global/config/FreeSurferAllLut.txt
    surf_atlas_dir: /opt/dcan-tools/pipeline/global/templates/standard_mesh_atlases
    gray_ordinates_dir: /opt/dcan-tools/pipeline/global/templates/Greyordinates
    gray_ordinates_res: 2
    high_res_mesh: 164
    low_res_mesh: 32
    fmri_res: 2
    smooth_fwhm: 2
  surface_connectivity:
    run: false
    surface_parcellation_template: /cpac_templates/Schaefer2018_200Parcels_17Networks_order.dlabel.nii
longitudinal_template_generation:
  run: false
  average_method: median
  dof: 12
  interp: trilinear
  cost: corratio
  thread_pool: 2
  convergence_threshold: -1
anatomical_preproc:
  run: true
  run_t2: false
  non_local_means_filtering:
    run:
    - false
    noise_model: Gaussian
  n4_bias_field_correction:
    run: true
    shrink_factor: 2
  t1t2_bias_field_correction:
    run: false
    BiasFieldSmoothingSigma: 5
  acpc_alignment:
    run: true
    run_before_preproc: true
    brain_size: 200
    FOV_crop: robustfov
    acpc_target: whole-head
    align_brain_mask: true
    T1w_ACPC_template: $FSLDIR/data/standard/MNI152_T1_1mm.nii.gz
    T1w_brain_ACPC_template: $FSLDIR/data/standard/MNI152_T1_1mm_brain.nii.gz
    T2w_ACPC_template: None
    T2w_brain_ACPC_template: None
  brain_extraction:
    run: true
    using: '[''3dSkullStrip'']'
    AFNI-3dSkullStrip:
      mask_vol: false
      shrink_factor: 0.6
      var_shrink_fac: true
      shrink_factor_bot_lim: 0.4
      avoid_vent: true
      n_iterations: 250
      pushout: true
      touchup: true
      fill_hole: 10
      NN_smooth: 72
      smooth_final: 20
      avoid_eyes: true
      use_edge: true
      exp_frac: 0.1
      push_to_edge: false
      use_skull: false
      perc_int: 0
      max_inter_iter: 4
      fac: 1
      blur_fwhm: 0
      monkey: false
    FSL-BET:
      Robustfov: false
      frac: 0.5
      mesh_boolean: false
      outline: false
      padding: false
      radius: 0
      reduce_bias: false
      remove_eyes: false
      robust: true
      skull: false
      surfaces: false
      threshold: false
      vertical_gradient: 0.0
    UNet:
      unet_model: s3://fcp-indi/resources/cpac/resources/Site-All-T-epoch_36.model
    niworkflows-ants:
      template_path: /ants_template/oasis/T_template0.nii.gz
      mask_path: /ants_template/oasis/T_template0_BrainCerebellumProbabilityMask.nii.gz
      regmask_path: /ants_template/oasis/T_template0_BrainCerebellumRegistrationMask.nii.gz
    FreeSurfer-BET:
      T1w_brain_template_mask_ccs: /ccs_template/MNI152_T1_1mm_first_brain_mask.nii.gz
segmentation:
  run: true
  tissue_segmentation:
    using:
    - FSL-FAST
    FSL-FAST:
      thresholding:
        use: Custom
        Custom:
          CSF_threshold_value: 0.9
          WM_threshold_value: 0.9
          GM_threshold_value: 0.9
      use_priors:
        run: true
        priors_path: $FSLDIR/data/standard/tissuepriors/2mm
        WM_path: $priors_path/avg152T1_white_bin.nii.gz
        GM_path: $priors_path/avg152T1_gray_bin.nii.gz
        CSF_path: $priors_path/avg152T1_csf_bin.nii.gz
    Template_Based:
      template_for_segmentation:
      - T1_Template
      WHITE: $FSLDIR/data/standard/tissuepriors/2mm/avg152T1_white_bin.nii.gz
      GRAY: $FSLDIR/data/standard/tissuepriors/2mm/avg152T1_gray_bin.nii.gz
      CSF: $FSLDIR/data/standard/tissuepriors/2mm/avg152T1_csf_bin.nii.gz
    ANTs_Prior_Based:
      template_brain_list:
      - /cpac_templates/MacaqueYerkes19_T1w_0.5mm_desc-JLC_T1w_brain.nii.gz
      - /cpac_templates/J_Macaque_11mo_atlas_nACQ_194x252x160space_0.5mm_desc-JLC_T1w_brain.nii.gz
      template_segmentation_list:
      - /cpac_templates/MacaqueYerkes19_T1w_0.5mm_desc-JLC_Segmentation.nii.gz
      - /cpac_templates/J_Macaque_11mo_atlas_nACQ_194x252x160space_0.5mm_desc-JLC_Segmentation.nii.gz
      CSF_label:
      - 24
      GM_label:
      - 3
      - 42
      WM_label:
      - 2
      - 41
    FreeSurfer:
      erode: 0
      CSF_label:
      - 24
      GM_label:
      - 3
      - 42
      WM_label:
      - 2
      - 41
registration_workflows:
  anatomical_registration:
    run: true
    resolution_for_anat: 1mm
    T1w_brain_template: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain.nii.gz
    T1w_template: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}.nii.gz
    T1w_brain_template_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask.nii.gz
    reg_with_skull: true
    registration:
      using:
      - ANTS
      ANTs:
        use_lesion_mask: false
        T1_registration:
        - collapse-output-transforms: 0
        - dimensionality: 3
        - initial-moving-transform:
            initializationFeature: 0
        - transforms:
          - Rigid:
              gradientStep: 0.1
              metric:
                type: MI
                metricWeight: 1
                numberOfBins: 32
                samplingStrategy: Regular
                samplingPercentage: 0.25
              convergence:
                iteration: 1000x500x250x100
                convergenceThreshold: 1e-08
                convergenceWindowSize: 10
              smoothing-sigmas: 3.0x2.0x1.0x0.0
              shrink-factors: 8x4x2x1
              use-histogram-matching: true
          - Affine:
              gradientStep: 0.1
              metric:
                type: MI
                metricWeight: 1
                numberOfBins: 32
                samplingStrategy: Regular
                samplingPercentage: 0.25
              convergence:
                iteration: 1000x500x250x100
                convergenceThreshold: 1e-08
                convergenceWindowSize: 10
              smoothing-sigmas: 3.0x2.0x1.0x0.0
              shrink-factors: 8x4x2x1
              use-histogram-matching: true
          - SyN:
              gradientStep: 0.1
              updateFieldVarianceInVoxelSpace: 3.0
              totalFieldVarianceInVoxelSpace: 0.0
              metric:
                type: CC
                metricWeight: 1
                radius: 4
              convergence:
                iteration: 100x100x70x20
                convergenceThreshold: 1e-09
                convergenceWindowSize: 15
              smoothing-sigmas: 3.0x2.0x1.0x0.0
              shrink-factors: 6x4x2x1
              use-histogram-matching: true
              winsorize-image-intensities:
                lowerQuantile: 0.01
                upperQuantile: 0.99
        interpolation: LanczosWindowedSinc
      FSL-FNIRT:
        fnirt_config: T1_2_MNI152_2mm
        ref_resolution: 2mm
        ref_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask_dil.nii.gz
        FNIRT_T1w_brain_template: None
        FNIRT_T1w_template: None
        interpolation: sinc
        identity_matrix: $FSLDIR/etc/flirtsch/ident.mat
        ref_mask_res-2: $FSLDIR/data/standard/MNI152_T1_2mm_brain_mask_dil.nii.gz
        T1w_template_res-2: $FSLDIR/data/standard/MNI152_T1_2mm.nii.gz
    overwrite_transform:
      run: false
      using: FSL
  functional_registration:
    coregistration:
      run: true
      reference: brain
      using: FSL
      input: brain
      interpolation: trilinear
      cost: corratio
      dof: 6
      arguments: None
      func_input_prep:
        reg_with_skull: false
        input:
        - Mean_Functional
        Mean Functional:
          n4_correct_func: false
        Selected Functional Volume:
          func_reg_input_volume: 0
      boundary_based_registration:
        run:
        - true
        bbr_schedule: $FSLDIR/etc/flirtsch/bbr.sch
        reference: whole-head
        bbr_wm_map: probability_map
        bbr_wm_mask_args: -thr 0.5 -bin
    EPI_registration:
      run: false
      using:
      - ANTS
      EPI_template: s3://fcp-indi/resources/cpac/resources/epi_hbn.nii.gz
      EPI_template_mask: None
      ANTs:
        parameters:
        - collapse-output-transforms: 0
        - dimensionality: 3
        - initial-moving-transform:
            initializationFeature: 0
        - transforms:
          - Rigid:
              gradientStep: 0.1
              metric:
                type: MI
                metricWeight: 1
                numberOfBins: 32
                samplingStrategy: Regular
                samplingPercentage: 0.25
              convergence:
                iteration: 1000x500x250x100
                convergenceThreshold: 1e-08
                convergenceWindowSize: 10
              smoothing-sigmas: 3.0x2.0x1.0x0.0
              shrink-factors: 8x4x2x1
              use-histogram-matching: true
          - Affine:
              gradientStep: 0.1
              metric:
                type: MI
                metricWeight: 1
                numberOfBins: 32
                samplingStrategy: Regular
                samplingPercentage: 0.25
              convergence:
                iteration: 1000x500x250x100
                convergenceThreshold: 1e-08
                convergenceWindowSize: 10
              smoothing-sigmas: 3.0x2.0x1.0x0.0
              shrink-factors: 8x4x2x1
              use-histogram-matching: true
          - SyN:
              gradientStep: 0.1
              updateFieldVarianceInVoxelSpace: 3.0
              totalFieldVarianceInVoxelSpace: 0.0
              metric:
                type: CC
                metricWeight: 1
                radius: 4
              convergence:
                iteration: 100x100x70x20
                convergenceThreshold: 1e-09
                convergenceWindowSize: 15
              smoothing-sigmas: 3.0x2.0x1.0x0.0
              shrink-factors: 6x4x2x1
              use-histogram-matching: true
              winsorize-image-intensities:
                lowerQuantile: 0.01
                upperQuantile: 0.99
        interpolation: LanczosWindowedSinc
      FSL-FNIRT:
        fnirt_config: T1_2_MNI152_2mm
        interpolation: sinc
        identity_matrix: $FSLDIR/etc/flirtsch/ident.mat
    func_registration_to_template:
      run: true
      run_EPI: false
      output_resolution:
        func_preproc_outputs: 2mm
        func_derivative_outputs: 2mm
      target_template:
        using:
        - T1_template
        T1_template:
          T1w_brain_template_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_brain.nii.gz
          T1w_template_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}.nii.gz
          T1w_brain_template_mask_funcreg: $FSLDIR/data/standard/MNI152_T1_${func_resolution}_brain_mask.nii.gz
          T1w_template_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_brain.nii.gz
        EPI_template:
          EPI_template_funcreg: s3://fcp-indi/resources/cpac/resources/epi_hbn.nii.gz
          EPI_template_mask_funcreg: None
          EPI_template_for_resample: $FSLDIR/data/standard/MNI152_T1_1mm_brain.nii.gz
      ANTs_pipelines:
        interpolation: LanczosWindowedSinc
      FNIRT_pipelines:
        interpolation: sinc
        identity_matrix: $FSLDIR/etc/flirtsch/ident.mat
      apply_transform:
        using: default
functional_preproc:
  run: true
  update_header:
    run: true
  truncation:
    start_tr: 0
    stop_tr: None
  scaling:
    run: false
    scaling_factor: 10
  despiking:
    run:
    - false
  slice_timing_correction:
    run:
    - true
    tpattern: interleaved
    tzero: 0.0
  motion_estimates_and_correction:
    run: true
    motion_estimates:
      calculate_motion_first: false
      calculate_motion_after: true
    motion_correction:
      using:
      - 3dvolreg
      AFNI-3dvolreg:
        functional_volreg_twopass: true
      motion_correction_reference:
      - mean
      motion_correction_reference_volume: 0
    motion_estimate_filter:
      run:
      - false
      filters:
      - filter_type: notch
        filter_order: 4
        breathing_rate_min: null
        breathing_rate_max: null
        center_frequency: null
        filter_bandwidth: null
      - filter_type: lowpass
        filter_order: 4
        breathing_rate_min: null
        lowpass_cutoff: null
  distortion_correction:
    run: '[Off]'
    using:
    - PhaseDiff
    - Blip
    PhaseDiff:
      fmap_skullstrip_option: BET
      fmap_skullstrip_BET_frac: 0.5
      fmap_skullstrip_AFNI_threshold: 0.6
    Blip-FSL-TOPUP:
      warpres: 10
      subsamp: 1
      fwhm: 8
      miter: 5
      lambda: 1
      ssqlambda: 1
      regmod: bending_energy
      estmov: 1
      minmet: 0
      splineorder: 3
      numprec: double
      interp: spline
      scale: 0
      regrid: 1
  func_masking:
    run: true
    using:
    - AFNI
    FSL-BET:
      functional_mean_boolean: false
      functional_mean_thr:
        run: false
        threshold_value: 98
      functional_mean_bias_correction: false
      frac: 0.3
      mesh_boolean: false
      outline: false
      padding: false
      radius: 0
      reduce_bias: false
      remove_eyes: false
      robust: false
      skull: false
      surfaces: false
      threshold: false
      vertical_gradient: 0.0
    FSL_AFNI:
      bold_ref: null
      brain_mask: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask.nii.gz
      brain_probseg: $FSLDIR/data/standard/MNI152_T1_${resolution_for_anat}_brain_mask.nii.gz
    Anatomical_Refined:
      anatomical_mask_dilation: false
    apply_func_mask_in_native_space: true
  generate_func_mean:
    run: true
  normalize_func:
    run: true
  coreg_prep:
    run: true
nuisance_corrections:
  1-ICA-AROMA:
    run: true
    denoising_type: nonaggr
  2-nuisance_regression:
    run:
    - true
    space: template
    create_regressors: true
    Regressors:
    - Name: default
      Motion:
        include_delayed: true
        include_squared: true
        include_delayed_squared: true
      aCompCor:
        summary:
          method: DetrendPC
          components: 5
        tissues:
        - WhiteMatter
        - CerebrospinalFluid
        extraction_resolution: 2
      CerebrospinalFluid:
        summary: Mean
        extraction_resolution: 2
        erode_mask: true
      GlobalSignal:
        summary: Mean
      PolyOrt:
        degree: 2
      Bandpass:
        bottom_frequency: 0.01
        top_frequency: 0.1
        method: default
    - Name: defaultNoGSR
      Motion:
        include_delayed: true
        include_squared: true
        include_delayed_squared: true
      aCompCor:
        summary:
          method: DetrendPC
          components: 5
        tissues:
        - WhiteMatter
        - CerebrospinalFluid
        extraction_resolution: 2
      CerebrospinalFluid:
        summary: Mean
        extraction_resolution: 2
        erode_mask: true
      PolyOrt:
        degree: 2
      Bandpass:
        bottom_frequency: 0.01
        top_frequency: 0.1
        method: default
    lateral_ventricles_mask: $FSLDIR/data/atlases/HarvardOxford/HarvardOxford-lateral-ventricles-thr25-2mm.nii.gz
    bandpass_filtering_order: '''Before'''
    regressor_masks:
      erode_anatomical_brain_mask:
        run: false
        brain_mask_erosion_prop: null
        brain_mask_erosion_mm: 30
        brain_erosion_mm: null
      erode_csf:
        run: false
        csf_erosion_prop: null
        csf_mask_erosion_mm: 30
        csf_erosion_mm: null
      erode_wm:
        run: false
        wm_erosion_prop: 0.6
        wm_mask_erosion_mm: null
        wm_erosion_mm: null
      erode_gm:
        run: false
        gm_erosion_prop: 0.6
        gm_mask_erosion_mm: null
        gm_erosion_mm: null
post_processing:
  spatial_smoothing:
    run: true
    output:
    - smoothed
    smoothing_method:
    - FSL
    fwhm:
    - 4
  z-scoring:
    run: true
    output:
    - z-scored
timeseries_extraction:
